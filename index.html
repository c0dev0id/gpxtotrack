<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unfuck Garmin GPX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div>
        <h1>Unfuck Garmin GPX</h1>
        <p class="tagline">Convert Garmin route files to clean GPX&nbsp;1.1 for any device.</p>
      </div>
      <p class="privacy-badge">&#128274; Files never leave your browser</p>
    </div>
  </header>

  <section id="upload" class="drop-zone">
    <svg class="drop-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p class="drop-msg">Drop a GPX file here</p>
    <p class="drop-or">or</p>
    <label class="file-button">
      <input type="file" id="file" accept=".gpx,application/gpx+xml">
      <span id="browseLabel">Browse&hellip;</span>
    </label>
  </section>

  <main id="content" hidden>
    <section id="input-col" class="col">
      <h2 class="col-label">Input</h2>
      <div id="input-body"></div>
    </section>
    <section id="options-col" class="col">
      <h2 class="col-label">Options</h2>
      <div id="options-body"></div>
      <button type="button" id="convertBtn" class="convert-btn">Convert</button>
    </section>
    <section id="output-col" class="col">
      <h2 class="col-label">Output</h2>
      <div id="output-body">
        <p class="placeholder">Click Convert to see results.</p>
      </div>
    </section>
  </main>

  <div id="download-bar" hidden>
    <button type="button" id="downloadBtn" disabled>Download</button>
  </div>

  <section id="errors" hidden>
    <h2 class="section-error-heading">Errors</h2>
    <ul id="errorList"></ul>
  </section>

  <footer>
    <a href="https://github.com/c0dev0id/gpxtotrack">Source on GitHub</a>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
